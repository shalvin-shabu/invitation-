<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Map Image</title>

<style>

:root{
    color-scheme:dark;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    background:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial, Helvetica, sans-serif;

    padding:20px;

}

/* Container */

.container{

    width:100%;

    max-width:900px;

}

/* Image */

.image-container{

    position:relative;

    border-radius:24px;

    overflow:hidden;

    box-shadow:
    0 25px 80px rgba(0,0,0,.55);

    filter:brightness(1.15);

}

.image-container img{

    width:100%;

    display:block;

    border-radius:24px;

}

/* Close Button */

.close-button{

    position:absolute;

    top:18px;

    right:18px;

    width:48px;

    height:48px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.45);

    backdrop-filter:blur(12px);

    -webkit-backdrop-filter:blur(12px);

    color:#fff;

    font-size:28px;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    transition:.3s;

    z-index:10;

    box-shadow:
    0 5px 15px rgba(0,0,0,.35);

}

.close-button:hover{

    background:rgba(255,255,255,.2);

    transform:scale(1.1);

}

.close-button:active{

    transform:scale(.95);

}

/* Mobile */

@media(max-width:600px){

    body{

        padding:10px;

    }

    .close-button{

        width:42px;

        height:42px;

        font-size:24px;

        top:12px;

        right:12px;

    }

}

</style>

</head>

<body>

<div class="container">

    <div class="image-container">

        <button
            class="close-button"
            onclick="window.location.href='video.html'">
            &times;
        </button>

       <img src="event_image.jpeg" alt="Event Flow">
    </div>

</div>

</body>
</html>

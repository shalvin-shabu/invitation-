<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">

<title>Holy Baptism Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Cinzel',serif;
}

body{
    background:#000;
    position:relative;
}

.background{
    position:fixed;
    inset:0;

    background:url("bg_image.jpeg") center center no-repeat;
    background-size:cover;
}

.overlay{
    position:absolute;
    inset:0;

    background:linear-gradient(
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
}

.glow{

    position:absolute;

    top:0;
    left:50%;

    transform:translateX(-50%);

    width:500px;
    height:500px;

    border-radius:50%;

    background:radial-gradient(

        circle,

        rgba(255,220,140,.35),

        transparent 70%

    );

    filter:blur(40px);

    animation:glow 5s ease-in-out infinite;

}

.top-buttons{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    z-index:10;

    pointer-events:none;

}

.card-btn{

    position:absolute;

    top:9%;

    width:29%;
    aspect-ratio: 1 / 1.1;

    transform:translate(-50%,-50%);

    border:none;
    background:transparent;

    color:transparent;
    font-size:0;

    cursor:pointer;

    pointer-events:auto;

    border-radius:16px;

    overflow:hidden;

    -webkit-tap-highlight-color:transparent;

    outline:none;

}

.card-btn:active{

    transform:translate(-50%,-50%) scale(.97);

}

.card-btn.invitation{ left:20%; }
.card-btn.maps{ left:51%; }
.card-btn.event-flow{ left:82%; }

.card-btn::before,
.card-btn::after{

    content:"";

    position:absolute;

    inset:6%;

    border-radius:45% 45% 10px 10px / 25% 25% 10px 10px;

    border:1.5px solid rgba(210,235,255,.55);

    box-shadow:0 0 10px 2px rgba(180,220,255,.22) inset;

    animation:idle-ripple 3s ease-out infinite;

    pointer-events:none;

}

.card-btn::after{

    animation-delay:1.5s;

}

@keyframes idle-ripple{

    0%{

        transform:scale(.97);
        opacity:.8;

    }

    70%{

        opacity:.15;

    }

    100%{

        transform:scale(1.04);
        opacity:0;

    }

}

.ripple{

    position:absolute;

    border-radius:50%;

    background:radial-gradient(
        circle,
        rgba(210,235,255,.55) 0%,
        rgba(150,210,255,.28) 45%,
        transparent 75%
    );

    transform:scale(0);

    pointer-events:none;

    animation:ripple-anim .7s ease-out forwards;

}

@keyframes ripple-anim{

    to{

        transform:scale(1);
        opacity:0;

    }

}

@keyframes glow{

0%{

opacity:.35;
transform:translateX(-50%) scale(.95);

}

50%{

opacity:.75;
transform:translateX(-50%) scale(1.05);

}

100%{

opacity:.35;
transform:translateX(-50%) scale(.95);

}

}

@media(max-width:768px){

.glow{

    width:350px;
    height:350px;

}

}

</style>

</head>

<body>

<audio id="bgMusic" loop>
    <source src="bg_music.mpeg" type="audio/mpeg">
</audio>

<div class="background"></div>

<div class="overlay"></div>

<div class="glow"></div>

<div class="top-buttons">

    <button class="card-btn invitation" onclick="window.location.href='invitation-image.html'" aria-label="Invitation"></button>

    <button class="card-btn maps" onclick="window.location.href='map_image.html'" aria-label="Maps"></button>

    <button class="card-btn event-flow" onclick="window.location.href='event_image.html'" aria-label="Event Flow"></button>

</div>

<script>

const music = document.getElementById("bgMusic");

document.addEventListener("click", function(){

    if(music.paused){

        music.volume = 0.6;

        music.play();

    }

},{once:true});

document.querySelectorAll(".card-btn").forEach(function(btn){

    btn.addEventListener("pointerdown", function(e){

        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 1.5;

        const x = (e.clientX ?? rect.left + rect.width / 2) - rect.left;
        const y = (e.clientY ?? rect.top + rect.height / 2) - rect.top;

        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (x - size / 2) + "px";
        ripple.style.top = (y - size / 2) + "px";

        btn.appendChild(ripple);

        ripple.addEventListener("animationend", function(){
            ripple.remove();
        });

    });

});

</script>

<script src="music.js"></script>
<script src="petals.js"></script>
<script>
  window.addEventListener('load', function () {
    window.initBackgroundMusic(false);
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">

<title>Holy Baptism Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Cinzel',serif;
}

body{
    background:#000;
    position:relative;
}

/* ===========================
   BACKGROUND IMAGE
=========================== */

.background{
    position:fixed;
    inset:0;

    background:url("bg_image.jpeg") center center no-repeat;
    background-size:cover;
}

/* ===========================
   OVERLAY
=========================== */

.overlay{
    position:absolute;
    inset:0;

    background:linear-gradient(
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
}

/* ===========================
   GOLDEN LIGHT
=========================== */

.glow{

    position:absolute;

    top:0;
    left:50%;

    transform:translateX(-50%);

    width:500px;
    height:500px;

    border-radius:50%;

    background:radial-gradient(

        circle,

        rgba(255,220,140,.35),

        transparent 70%

    );

    filter:blur(40px);

    animation:glow 5s ease-in-out infinite;

}

/* ===========================
   BUTTON CONTAINER
=========================== */

.button-container{

    position:absolute;

    bottom:40px;

    left:50%;

    transform:translateX(-50%);

    display:flex;

    gap:18px;

    z-index:10;

}

/* ===========================
   BUTTON STYLE
=========================== */

.button-container button{

    padding:15px 28px;

    border:none;

    border-radius:50px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(12px);

    -webkit-backdrop-filter:blur(12px);

    color:white;

    font-size:15px;

    font-weight:600;

    letter-spacing:.5px;

    cursor:pointer;

    transition:.3s;

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
    0 8px 25px rgba(0,0,0,.30);

}

.button-container button:hover{

    background:rgba(255,215,120,.30);

    transform:translateY(-3px);

    box-shadow:
    0 0 20px rgba(255,215,120,.50);

}

.button-container button:active{

    transform:scale(.96);

}

/* ===========================
   GLOW ANIMATION
=========================== */

@keyframes glow{

0%{

opacity:.35;
transform:translateX(-50%) scale(.95);

}

50%{

opacity:.75;
transform:translateX(-50%) scale(1.05);

}

100%{

opacity:.35;
transform:translateX(-50%) scale(.95);

}

}

/* ===========================
   MOBILE
=========================== */

@media(max-width:768px){

.button-container{

    width:90%;

    flex-direction:column;

}

.button-container button{

    width:100%;

    font-size:16px;

}

.glow{

    width:350px;
    height:350px;

}

}

</style>

</head>

<body>

<!-- Background Music -->

<audio id="bgMusic" loop>
    <source src="bg_music.mpeg" type="audio/mpeg">
</audio>

<!-- Background -->

<div class="background"></div>

<div class="overlay"></div>

<div class="glow"></div>

<!-- Buttons -->

<div class="button-container">

    <button onclick="window.location.href='invitation-image.html'">
        ✉ Invitation
    </button>

    <button onclick="window.location.href='map_image.html'">
        📍 Maps
    </button>

    <button onclick="window.location.href='event_image.html'">
        📅 Event Flow
    </button>

</div>

<script>

// Play music after first interaction
const music = document.getElementById("bgMusic");

document.addEventListener("click", function(){

    if(music.paused){

        music.volume = 0.6;

        music.play();

    }

},{once:true});

</script>

</body>
</html>

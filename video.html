<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">

<title>Holy Baptism Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
height:100%;
overflow:hidden;
font-family:'Cinzel',serif;

}

body{

background:#000;
position:relative;

}

/* ===========================
   BACKGROUND IMAGE
=========================== */

.background{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:url("bg_image.jpeg") center center no-repeat;

background-size:cover;

animation:zoom 20s ease-in-out infinite alternate;

}

/* ===========================
   DARK OVERLAY
=========================== */

.overlay{

position:absolute;

inset:0;

background:linear-gradient(

rgba(0,0,0,.15),

rgba(0,0,0,.35)

);

}

/* ===========================
   GOLDEN GLOW
=========================== */

.glow{

position:absolute;

top:-20%;

left:50%;

transform:translateX(-50%);

width:600px;

height:600px;

border-radius:50%;

background:

radial-gradient(circle,

rgba(255,220,140,.45),

transparent 70%

);

filter:blur(40px);

animation:glow 5s ease-in-out infinite;

}

/* ===========================
   BUTTON CONTAINER
=========================== */

.button-container{

position:absolute;

bottom:45px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:20px;

z-index:100;

}

/* ===========================
   BUTTON
=========================== */

.button-container button{

padding:15px 28px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:15px;

font-weight:bold;

letter-spacing:1px;

color:white;

background:rgba(255,255,255,.12);

backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.25);

box-shadow:

0 8px 25px rgba(0,0,0,.35);

transition:.35s;

font-family:'Cinzel',serif;

}

.button-container button:hover{

background:rgba(255,215,140,.25);

transform:translateY(-4px);

box-shadow:

0 0 25px rgba(255,215,120,.5);

}

.button-container button:active{

transform:scale(.96);

}

/* ===========================
   ANIMATIONS
=========================== */

@keyframes zoom{

0%{

transform:scale(1);

}

100%{

transform:scale(1.08);

}

}

@keyframes glow{

0%{

opacity:.4;

transform:

translateX(-50%)

scale(.9);

}

50%{

opacity:.9;

transform:

translateX(-50%)

scale(1.1);

}

100%{

opacity:.4;

transform:

translateX(-50%)

scale(.9);

}

}

/* ===========================
   MOBILE
=========================== */

@media(max-width:768px){

.button-container{

flex-direction:column;

width:90%;

}

.button-container button{

width:100%;

font-size:16px;

}

.glow{

width:450px;

height:450px;

}

}

</style>

</head>

<body>

<!-- Background Music -->

<audio id="bgMusic" autoplay loop>

<source src="bg_music.mpeg" type="audio/mpeg">

</audio>

<!-- Background -->

<div class="background"></div>

<!-- Overlay -->

<div class="overlay"></div>

<!-- Golden Glow -->

<div class="glow"></div>

<!-- Buttons -->

<div class="button-container">

    <button onclick="window.location.href='invitation-image.html'">
        ✉ Invitation
    </button>

    <button onclick="window.location.href='map_image.html'">
        📍 Maps
    </button>

    <button onclick="window.location.href='event_image.html'">
        📅 Event Flow
    </button>

</div>

<script>

window.addEventListener("load",()=>{

const music=document.getElementById("bgMusic");

music.volume=.6;

music.play().catch(()=>{

document.body.addEventListener("click",()=>{

music.play();

},{once:true});

});

});

</script>

</body>
</html>

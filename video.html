<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">

<title>Holy Baptism Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Cinzel',serif;
}

body{
    background:#000;
    position:relative;
}

.background{
    position:fixed;
    inset:0;

    background:url("bg_image.jpeg") center center no-repeat;
    background-size:cover;
}

.overlay{
    position:absolute;
    inset:0;

    background:linear-gradient(
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
}

.glow{

    position:absolute;

    top:0;
    left:50%;

    transform:translateX(-50%);

    width:500px;
    height:500px;

    border-radius:50%;

    background:radial-gradient(

        circle,

        rgba(255,220,140,.35),

        transparent 70%

    );

    filter:blur(40px);

    animation:glow 5s ease-in-out infinite;

}

.top-buttons{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    z-index:10;

    pointer-events:none;

}

.card-btn{

    position:absolute;

    top:9%;

    width:29%;
    aspect-ratio: 1 / 1.1;

    transform:translate(-50%,-50%);

    border:none;
    background:transparent;

    color:transparent;
    font-size:0;

    cursor:pointer;

    pointer-events:auto;

    border-radius:16px;

    overflow:hidden;

    -webkit-tap-highlight-color:transparent;

    outline:none;

}

.card-btn:active{

    transform:translate(-50%,-50%) scale(.97);

}

.card-btn.invitation{ left:20%; }
.card-btn.maps{ left:51%; }
.card-btn.event-flow{ left:82%; }

.card-btn::before,
.card-btn::after{

    content:"";

    position:absolute;

    inset:6%;

    border-radius:45% 45% 10px 10px / 25% 25% 10px 10px;

    border:1.5px solid rgba(210,235,255,.55);

    box-shadow:0 0 10px 2px rgba(180,220,255,.22) inset;

    animation:idle-ripple 3s ease-out infinite;

    pointer-events:none;

}

.card-btn::after{

    animation-delay:1.5s;

}

@keyframes idle-ripple{

    0%{

        transform:scale(.97);
        opacity:.8;

    }

    70%{

        opacity:.15;

    }

    100%{

        transform:scale(1.04);
        opacity:0;

    }

}

.ripple{

    position:absolute;

    border-radius:50%;

    background:radial-gradient(
        circle,
        rgba(210,235,255,.55) 0%,
        rgba(150,210,255,.28) 45%,
        transparent 75%
    );

    transform:scale(0);

    pointer-events:none;

    animation:ripple-anim .7s ease-out forwards;

}

@keyframes ripple-anim{

    to{

        transform:scale(1);
        opacity:0;

    }

}

@keyframes glow{

0%{

opacity:.35;
transform:translateX(-50%) scale(.95);

}

50%{

opacity:.75;
transform:translateX(-50%) scale(1.05);

}

100%{

opacity:.35;
transform:translateX(-50%) scale(.95);

}

}

/*==========================================
    COUNTDOWN STYLES (Elegant & Responsive) - REDUCED SIZE
============================================*/

.countdown-section {
    position: absolute;
    left: 50%;
    top: 48%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 380px;
    margin: 0 auto;
    text-align: center;
    z-index: 20;
    font-family: 'Cinzel', serif;
    -webkit-font-smoothing: antialiased;
}

/* Ornaments above and below title */
.countdown-title {
    font-size: clamp(11px, 3.2vw, 15px);
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #2b1b0d;
    margin-bottom: 8px;
    text-shadow: 0 0 8px rgba(255, 240, 200, 0.8), 0 0 2px rgba(196, 155, 63, 0.5);
    text-transform: uppercase;
    white-space: nowrap;
}

.countdown-title::before,
.countdown-title::after {
    content: "";
    display: block;
    width: 70px;
    height: 1px;
    background: linear-gradient(
        to right,
        transparent,
        rgba(196, 155, 63, 0.9) 30%,
        rgba(255, 225, 160, 1) 50%,
        rgba(196, 155, 63, 0.9) 70%,
        transparent
    );
    margin: 6px auto;
}

/* Soft golden glow panel behind the numbers */
.countdown-glow-wrap {
    position: relative;
    display: inline-block;
    padding: 6px 14px;
}

.countdown-glow-wrap::before {
    content: "";
    position: absolute;
    inset: -10px -6px;
    background: radial-gradient(
        ellipse at center,
        rgba(255, 235, 190, 0.55) 0%,
        rgba(255, 220, 150, 0.25) 45%,
        transparent 75%
    );
    filter: blur(24px);
    z-index: -1;
    border-radius: 50%;
}

#countdown {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: clamp(4px, 2vw, 10px);
    width: 100%;
}

.time-box {
    flex: 0 1 auto;
    width: clamp(40px, 11vw, 52px);
    /* Prevents layout shifting when numbers change width */
    font-variant-numeric: tabular-nums; 
}

.time-box span {
    display: block;
    font-size: clamp(28px, 7.5vw, 40px);
    line-height: 0.85;
    color: #2b1608;
    font-weight: 700;
    letter-spacing: -1px;
    text-shadow:
        0 0 10px rgba(255, 240, 200, 0.95),
        0 0 22px rgba(255, 210, 130, 0.7),
        0 2px 3px rgba(43, 22, 8, 0.25);
    white-space: nowrap;
}

.time-box small {
    display: block;
    margin-top: 4px;
    font-size: clamp(7px, 2vw, 10px);
    font-weight: 700;
    color: #402715;
    letter-spacing: 1px;
    white-space: nowrap;
}

/* Vertical Gold Dividers */
.divider {
    width: 1px;
    height: clamp(28px, 8vw, 44px);
    background: linear-gradient(
        to bottom,
        transparent,
        rgba(196, 155, 63, 0.6) 20%,
        rgba(196, 155, 63, 0.6) 80.,
        transparent
    );
    align-self: center;
}

/* Responsive Overrides */
@media(max-width:768px){

.glow{
    width:350px;
    height:350px;
}

.countdown-section {
    top: 48%;
}

}

/* Extra-narrow phones */
@media(max-width:340px){

.countdown-section {
    width: 94%;
}

#countdown {
    gap: 5px;
}

}

</style>

</head>

<body>

<audio id="bgMusic" loop>
    <source src="bg_music.mpeg" type="audio/mpeg">
</audio>

<div class="background"></div>

<div class="overlay"></div>

<div class="glow"></div>

<div class="top-buttons">

    <button class="card-btn invitation" onclick="window.location.href='invitation-image.html'" aria-label="Invitation"></button>

    <button class="card-btn maps" onclick="window.location.href='map_image.html'" aria-label="Maps"></button>

    <button class="card-btn event-flow" onclick="window.location.href='event_image.html'" aria-label="Event Flow"></button>

</div>

<!-- ==========================================
     COUNTDOWN SECTION (Inserted below the buttons)
     ========================================== -->
<div class="countdown-section">

    <div class="countdown-title">
        TIME COUNTDOWN
    </div>

    <div class="countdown-glow-wrap">
    <div id="countdown">

        <div class="time-box">
            <span id="days">00</span>
            <small>DAYS</small>
        </div>

        <div class="divider"></div>

        <div class="time-box">
            <span id="hours">00</span>
            <small>HOURS</small>
        </div>

        <div class="divider"></div>

        <div class="time-box">
            <span id="minutes">00</span>
            <small>MINUTES</small>
        </div>

        <div class="divider"></div>

        <div class="time-box">
            <span id="seconds">00</span>
            <small>SECONDS</small>
        </div>

    </div>
    </div>

</div>

<script>

const music = document.getElementById("bgMusic");

document.addEventListener("click", function(){

    if(music.paused){

        music.volume = 0.6;

        music.play();

    }

},{once:true});

document.querySelectorAll(".card-btn").forEach(function(btn){

    btn.addEventListener("pointerdown", function(e){

        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 1.5;

        const x = (e.clientX ?? rect.left + rect.width / 2) - rect.left;
        const y = (e.clientY ?? rect.top + rect.height / 2) - rect.top;

        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (x - size / 2) + "px";
        ripple.style.top = (y - size / 2) + "px";

        btn.appendChild(ripple);

        ripple.addEventListener("animationend", function(){
            ripple.remove();
        });

    });

});

/*==========================================
    COUNTDOWN CORE ENGINE
============================================*/
(function() {
    // Target Countdown Date
    const targetDate = new Date("September 8, 2026 16:32:00").getTime();

    // Cache elements to save DOM lookup performance
    const elDays = document.getElementById("days");
    const elHours = document.getElementById("hours");
    const elMinutes = document.getElementById("minutes");
    const elSeconds = document.getElementById("seconds");

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance <= 0) {
            if (elDays) elDays.textContent = "00";
            if (elHours) elHours.textContent = "00";
            if (elMinutes) elMinutes.textContent = "00";
            if (elSeconds) elSeconds.textContent = "00";
            clearInterval(timerInterval);
            return;
        }

        // Calculations
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Format to double digits
        if (elDays) elDays.textContent = String(days).padStart(2, "0");
        if (elHours) elHours.textContent = String(hours).padStart(2, "0");
        if (elMinutes) elMinutes.textContent = String(minutes).padStart(2, "0");
        if (elSeconds) elSeconds.textContent = String(seconds).padStart(2, "0");
    }

    // Run instantly on initialization, then set interval
    updateCountdown();
    const timerInterval = setInterval(updateCountdown, 1000);
})();

</script>

<script src="music.js"></script>
<script src="petals.js"></script>
<script>
  window.addEventListener('load', function () {
    window.initBackgroundMusic(false);
  });
</script>
</body>
</html>

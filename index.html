<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Front Page</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url("front_page.jpeg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        font-family: Arial, sans-serif;
        filter: brightness(1.2);
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.35) 100%);
      }

      /* Positioned to sit exactly over the "OPEN" graphic
         already printed on the background image (~50% across,
         ~77% down the image). vw-based sizing scales the
         invisible tap area / ring animation with the image. */
      .open-btn-wrap {
        position: absolute;
        top: 88%;
        left: 49%;
        transform: translate(-50%, -50%);
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .open-btn {
        position: relative;
        width: 19vw;
        height: 19vw;
        max-width: 150px;
        max-height: 150px;
        min-width: 70px;
        min-height: 70px;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: transparent;
        font-size: 0;
        cursor: pointer;
        box-shadow: 0 0 0 0 rgba(255, 215, 180, 0.45);
        animation: pulse 2s infinite;
        transition: transform 0.25s ease;
      }

      .open-btn:hover {
        transform: scale(1.06);
      }

      .open-btn:active {
        transform: scale(0.96);
      }

      .open-btn::before,
      .open-btn::after {
        content: "";
        position: absolute;
        inset: -10px;
        border: 2px solid rgba(255, 217, 182, 0.5);
        border-radius: 50%;
        animation: ring 2.2s ease-out infinite;
      }

      .open-btn::after {
        animation-delay: 1.1s;
      }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 215, 180, 0.35); }
        40% { box-shadow: 0 0 22px 6px rgba(255, 215, 180, 0.12); }
        100% { box-shadow: 0 0 0 0 rgba(255, 215, 180, 0); }
      }

      @keyframes ring {
        0% { transform: scale(0.85); opacity: 0.8; }
        100% { transform: scale(1.35); opacity: 0; }
      }

    </style>
  </head>
  <body>
    <div class="overlay"></div>
    <div class="open-btn-wrap">
      <button class="open-btn" onclick="window.location.href='video.html'" aria-label="Open"></button>
    </div>
  </body>
</html>

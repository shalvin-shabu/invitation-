<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="theme-color" content="#000000">

<title>Holy Baptism Invitation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100%;
    overflow:hidden;

}

body{

    position:relative;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#000;

    font-family:Arial,Helvetica,sans-serif;

}

/* ============================
   BACKGROUND IMAGE
============================ */

.background{

    position:absolute;

    inset:0;

    background-image:url("front_page.jpeg");

    background-repeat:no-repeat;

    background-position:center center;

    background-size:contain;

    background-color:#000;

    filter:brightness(2);

}

/* Mobile */

@media(max-width:768px){

.background{

    background-size:cover;

}

}

/* ============================
   OVERLAY
============================ */

.overlay{

    position:absolute;

    inset:0;

    background:linear-gradient(

        rgba(0,0,0,.20),

        rgba(0,0,0,.40)

    );

}

/* ============================
   OPEN BUTTON
============================ */

.open-btn-wrap{

    position:absolute;

    left:49%;

    top:88%;

    transform:translate(-50%,-50%);

    z-index:10;

}

.open-btn{

    width:110px;

    height:110px;

    border:none;

    border-radius:50%;

    background:transparent;

    cursor:pointer;

    position:relative;

    -webkit-tap-highlight-color:transparent;

    outline:none;

}

/* Pulse */

.open-btn::before,

.open-btn::after{

    content:"";

    position:absolute;

    inset:-8px;

    border-radius:50%;

    border:2px solid rgba(255,215,180,.55);

    animation:ring 2.2s infinite;

}

.open-btn::after{

    animation-delay:1.1s;

}

@keyframes ring{

0%{

transform:scale(.85);

opacity:1;

}

100%{

transform:scale(1.4);

opacity:0;

}

}

.open-btn:hover{

transform:scale(1.05);

}

.open-btn:active{

transform:scale(.95);

}

/* Mobile */

@media(max-width:768px){

.open-btn{

    width:82px;

    height:82px;

}

.open-btn-wrap{

    top:88%;

}

}

</style>

</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="open-btn-wrap">

<button

class="open-btn"

aria-label="Open">

</button>

</div>

<script src="music.js"></script>
<script src="petals.js"></script>
<script>
  window.addEventListener('load', function () {
    window.initBackgroundMusic(true);
  });

  document.querySelector('.open-btn').addEventListener('click', function (event) {
    event.preventDefault();
    window.sessionStorage.setItem('petalFlowActive', '1');
    window.startPetalAnimation();
    window.setTimeout(function () {
      window.location.href = 'video.html';
    }, 140);
  });
</script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Front Page</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url("WhatsApp Image 2026-07-03 at 4.07.37 AM (1).jpeg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        font-family: Arial, sans-serif;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.35) 100%);
      }

      .open-btn-wrap {
        position: absolute;
        bottom: 2.5rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .open-btn {
        position: relative;
        width: 84px;
        height: 84px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 1.15rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 0 0 0 rgba(255, 215, 180, 0.45);
        animation: pulse 2s infinite;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      }

      .open-btn:hover {
        transform: scale(1.08);
        background: rgba(255, 255, 255, 0.12);
      }

      .open-btn:active {
        transform: scale(0.96);
      }

      .open-btn::before,
      .open-btn::after {
        content: "";
        position: absolute;
        inset: -10px;
        border: 2px solid rgba(255, 215, 180, 0.55);
        border-radius: 50%;
        animation: ring 1.8s linear infinite;
      }

      .open-btn::after {
        animation-delay: 0.9s;
      }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 215, 180, 0.45); }
        40% { box-shadow: 0 0 24px 4px rgba(255, 215, 180, 0.14); }
        100% { box-shadow: 0 0 0 0 rgba(255, 215, 180, 0); }
      }

      @keyframes ring {
        0% { transform: scale(0.9); opacity: 1; }
        100% { transform: scale(1.18); opacity: 0; }
      }

      @media (max-width: 480px) {
        .open-btn {
          width: 74px;
          height: 74px;
          font-size: 1rem;
        }
      }

    </style>
  </head>
  <body>
    <div class="overlay"></div>
    <div class="open-btn-wrap">
      <button class="open-btn">Open</button>
    </div>
  </body>
</html>

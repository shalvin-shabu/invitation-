<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Invitation Image</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
      }

      .container {
        width: 100%;
        max-width: 900px;
        padding: 1rem;
      }

      .back-button {
        padding: 0.7rem 1rem;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(255, 215, 180, 0.35);
        border-radius: 8px;
        background: rgba(255, 215, 180, 0.14);
        color: #fff;
        font-size: 0.95rem;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }

      .back-button:hover {
        background: rgba(255, 215, 180, 0.25);
        transform: translateY(-1px);
      }

      .image-container {
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        filter: brightness(1.2);
      }

      .image-container img {
        width: 100%;
        height: auto;
        display: block;
      }

      @media (max-width: 540px) {
        .container {
          padding: 0.75rem;
        }

        .back-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button class="back-button" onclick="window.location.href='video.html'">← Back</button>
      <div class="image-container">
        <img src="invite_card.jpeg" alt="Invitation Image" />
      </div>
    </div>
  </body>
</html>

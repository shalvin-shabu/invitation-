<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">

<title>Venue Map</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000;

    font-family:Arial,Helvetica,sans-serif;

}

.container{

    width:100vw;
    height:100vh;

}

.image-container{

    position:relative;

    width:100%;
    height:100%;

    overflow:hidden;

}

.image-container img{

    width:100%;
    height:100%;

    object-fit:contain;

    display:block;

    filter:brightness(1.15);

}

/* ============================
   CLOSE BUTTON
============================ */

.close-button{

    position:absolute;

    top:20px;
    right:20px;

    width:50px;
    height:50px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.45);

    color:white;

    font-size:28px;

    cursor:pointer;

    z-index:999;

    backdrop-filter:blur(10px);

    transition:.3s;

    -webkit-tap-highlight-color:transparent;

    outline:none;

}

.close-button:hover{

    transform:scale(1.1);

    background:rgba(255,255,255,.25);

}

/* ============================
   TRANSPARENT LINKS
============================ */

.location-link{

    position:absolute;

    display:block;

    background:transparent;

    cursor:pointer;

    z-index:50;

    -webkit-tap-highlight-color:transparent;

    outline:none;

}

/* Church */

.church-location{

    left:35.3%;
    top:42.6%;

    width:25%;
    height:3%;

}

/* Reception */

.reception-location{

    left:35.3%;
    top:66.1%;

    width:25%;
    height:3%;

}

/* ==========================================
   Uncomment while adjusting hotspot positions
========================================== */

/*

.location-link{

background:red;
opacity:.35;

}

*/

/* ============================
   MOBILE
============================ */

@media(max-width:768px){

.close-button{

    width:42px;
    height:42px;

    font-size:24px;

    top:12px;
    right:12px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="image-container">

<button

class="close-button"

onclick="window.location.href='video.html'">

&times;

</button>

<img

src="map_image.jpeg"

alt="Venue Map">

<!-- Church -->

<a

class="location-link church-location"

href="https://www.google.com/maps/search/?api=1&query=St.+Joseph+Forane+Church+Kodakara"

target="_blank">

</a>

<!-- Reception -->

<a

class="location-link reception-location"

href="https://www.google.com/maps/search/?api=1&query=Royal+Garden+Kuttikkad+Kerala"

target="_blank">

</a>

</div>

</div>

</body>
</html>

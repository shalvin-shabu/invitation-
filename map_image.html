<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Venue Map</title>

<style>

:root{
    color-scheme: dark;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    background:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    font-family:Arial, Helvetica, sans-serif;

}

/* Container */

.container{

    width:100%;
    max-width:900px;

}

/* Image */

.image-container{

    position:relative;

    border-radius:24px;

    overflow:hidden;

    box-shadow:0 25px 80px rgba(0,0,0,.55);

    filter:brightness(1.15);

}

.image-container img{

    width:100%;

    display:block;

}

/* Close Button */

.close-button{

    position:absolute;

    top:18px;
    right:18px;

    width:48px;
    height:48px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.45);

    color:#fff;

    font-size:30px;

    cursor:pointer;

    z-index:100;

    backdrop-filter:blur(10px);

    transition:.3s;

}

.close-button:hover{

    background:rgba(255,255,255,.2);

    transform:scale(1.08);

}

/* ----------------------------
   CLICKABLE MAP AREAS
---------------------------- */

.location-link{

    position:absolute;

    display:block;

    border-radius:30px;

    cursor:pointer;

    z-index:50;

}

/* Church Get Directions */

.church-location {
    left: 35.5%;
    top: 42.8%;
    width: 25%;
    height: 2.8%;
}

/* Reception Get Directions */

.reception-location {
    left: 35.5%;
    top: 66.2%;
    width: 25%;
    height: 3.8%;
}

/* Uncomment this while adjusting positions */


.location-link{
    background:none;
}


@media(max-width:600px){

body{
    padding:10px;
}

.close-button{

    width:42px;
    height:42px;

    font-size:24px;

    top:12px;
    right:12px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="image-container">

<button
class="close-button"
onclick="window.location.href='video.html'">

&times;

</button>

<img src="map_image.jpeg" alt="Venue">

<!-- Church -->

<a
class="location-link church-location"
href="https://www.google.com/maps/search/?api=1&query=St.+Joseph+Forane+Church+Kodakara"
target="_blank"
title="Open Church Location">
</a>

<!-- Reception -->

<a
class="location-link reception-location"
href="https://www.google.com/maps/search/?api=1&query=Royal+Garden+Kuttikkad+Kerala"
target="_blank"
title="Open Reception Location">
</a>

</div>

</div>

</body>
</html>
